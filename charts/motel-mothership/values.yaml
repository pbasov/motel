global:
  clusterLabel: clusterName
  storageClass: standard
  clusterName: mothership
victoriametrics:
  enabled: enabled
  vmcluster:
    enabled: true
    replicationFactor: 1
    replicaCount: 1
  vmalert:
    enabled: true
    remoteRead: http://promxy:8082
grafana:
  enabled: true
  ingress:
    enabled: false
    host: grafana.example.com
  alerts:
    enabled: true
  datasource:
    url: http://promxy:8082
victoria-metrics-operator:
  enabled: true
  crds:
    plain: true
promxy:
  replicaCount: 1
  deployment:
    enabled: true
  image:
    repository: quay.io/jacksontj/promxy
    tag: "latest"
    pullPolicy: IfNotPresent
  podDisruptionBudget:
    enabled: false
  serviceAccount:
    create: true
    annotations: {}
    # If not set, generated using the fullname template
    name:
  hpa:
    enabled: false
  verticalAutoscaler:
    enabled: false
  service:
    type: ClusterIP
    enabled: true
    servicePort: 8082
    annotations: {}
    extraLabels: {}
    clusterIP: ""
    externalIPs: []
    loadBalancerIP: ""
    loadBalancerSourceRanges: []
  ingress:
    enabled: false
    ingressClassName: nginx
    annotations: {}
    extraLabels: {}
    path: /
    pathType: Prefix
    hosts:
      - example.com
    tls: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi
  extraArgs:
    log-level: "info"
  configMap: ""
  config:
    global:
      evaluation_interval: 5s
      external_labels:
        source: promxy
    # remote_write configuration is used by promxy as its local Appender, meaning all
    # metrics promxy would "write" (not export) would be sent to this. Examples
    # of this include: recording rules, metrics on alerting rules, etc.
    remote_write:
      - url: http://localhost:8083/receive
    promxy:
      server_groups:
        - static_configs:
            - targets:
              - vmauth.hmc0.example.net:443
          path_prefix: /select/0/prometheus/
          scheme: https
          http_client:
            dial_timeout: 1s
            tls_config:
              insecure_skip_verify: true
          labels:
            promxyCluster: hmc0
        - static_configs:
            - targets:
              - vmauth.hmc1.example.net:443
          path_prefix: /select/0/prometheus/
          scheme: https
          http_client:
            dial_timeout: 1s
            tls_config:
              insecure_skip_verify: true
          labels:
            promxyCluster: hmc1