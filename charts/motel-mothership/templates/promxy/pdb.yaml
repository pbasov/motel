{{- if .Values.promxy.podDisruptionBudget.enabled }}
apiVersion: policy/v1beta1
kind: PodDisruptionBudget
metadata:
  name: {{ template "chart.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    {{- if .Values.promxy.podDisruptionBudget.labels}}
    {{ toYaml .Values.promxy.podDisruptionBudget.labels | nindent 4 }}
    {{- end}}
spec:
{{- if .Values.promxy.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.promxy.podDisruptionBudget.minAvailable }}
{{- end }}
{{- if .Values.promxy.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.promxy.podDisruptionBudget.maxUnavailable }}
{{- end }}
  selector:
    matchLabels:
      {{- include "chart.selectorLabels" . | nindent 6 }}
{{- end }}
